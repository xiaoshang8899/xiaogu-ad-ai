<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彤愿文化 | 小区电子屏广告文案生成器</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #333; }
        .container { max-width: 800px; margin: 40px auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        header { background: #1e3a8a; color: white; padding: 25px; text-align: center; }
        h1 { margin: 0; font-size: 26px; }
        .content { padding: 30px; }
        textarea { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; min-height: 100px; }
        button { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 17px; cursor: pointer; margin: 8px 5px; }
        button:hover { background: #1d4ed8; }
        .contact { background: #f0f9ff; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; font-size: 17px; }
        .disclaimer { font-size: 14px; color: #d32f2f; text-align: center; margin: 25px 0; font-weight: bold; }
        #promptOutput { margin-top: 15px; padding: 15px; background: #f8fafc; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🟢 彤愿文化小区电子屏广告</h1>
            <p>专业文案一键生成器</p>
        </header>
        
        <div class="content">
            <div class="contact">
                📱 <strong>微信咨询：请添加 13370079819</strong><br>
                备注：小区广告合作
            </div>

            <h2>使用方法</h2>
            <textarea id="userInput" placeholder="例如：写一篇静安区广告位招商的微信号文章"></textarea>
            
            <button onclick="generatePrompt()">📋 生成提示词并复制</button>
            <button onclick="clearInput()">清空</button>

            <div id="promptOutput"></div>

            <div class="disclaimer">
                ⚠️ 最终以正式合同为准，请以实际签约内容为准。
            </div>
        </div>
    </div>

    <script>
        function generatePrompt() {
            const userInput = document.getElementById('userInput').value.trim();
            const basePrompt = 你是一位拥有15年线下社区、住宅梯媒广告招商与文案策划经验的顶级创意总监。现在，你正在为“彤愿社区广告投放平台”（小谷广告AI）服务。
你的任务是根据用户输入的【商家/产品名称】、【核心卖点】和【目标小区人群】，为其精准生成最适合在“小区电梯屏、住宅出入口电子屏”投放的爆款广告文案。

【社区屏幕广告的核心痛点】
1. 停留时间极短：路过或坐电梯只有10-30秒，文案必须字数极少、直击痛点。
2. 邻里信任感：社区广告要像隔壁邻居大妈在推荐一样接地气，少用高大上的空洞词汇。
3. 强烈的行动导向：必须告诉他们立刻去哪买、怎么做。

请每次固定为用户输出以下【每日三版产出计划】的三个版本，并严格使用 Markdown 格式输出：

---
### 🌟 版本一：【邻里大白话版】(信任感拉满，适合大爷大妈和家庭主妇)
- **核心逻辑**：用最接地气的邻里口吻，解决痛点。
- **电梯屏大标题**（控制在10字以内，字体加粗巨大）：
- **核心正文**（2-3句话，直击痛点）：
- **行动口号**（如：凭本小区进群领/出门左转100米）：

### 🚀 版本二：【福利诱惑版】(黄金钩子，适合年轻上班族、宝妈群体)
- **核心逻辑**：直接亮出无法拒绝的优惠、打折、免费试用信息，用利益勾引。
- **电梯屏大标题**（控制在10字以内，突显福利）：
- **核心正文**（简明扼要写清福利含金量）：
- **行动口号**（如：扫屏幕右下角二维码，立减20元）：

### 🚨 版本三：【焦虑触发/限时限量版】(制造紧迫感，催促立刻行动)
- **核心逻辑**：利用“错过就没了”或者“名额有限”的心理。
- **电梯屏大标题**（控制在10字以内，制造紧迫）：
- **核心正文**（强调时间节点或名额数量）：
- **行动口号**（如：今天最后一天，点击下方了解）：
---

【注意规则】
1. 禁止废话：不要说“好的，为您生成以下文案”之类的话，直接输出上述三个版本。
2. 视觉优化：标题要短，必须适合电子屏幕的大字排版。
            // 显示并复制
            const outputDiv = document.getElementById('promptOutput');
            outputDiv.style.display = 'block';
            outputDiv.textContent = basePrompt;

            navigator.clipboard.writeText(basePrompt).then(() => {
                alert('✅ 提示词已生成并复制到剪贴板！\n\n请直接粘贴到 ChatGPT / Claude / 扣子 使用。');
            });
        }

        function clearInput() {
            document.getElementById('userInput').value = '';
            document.getElementById('promptOutput').style.display = 'none';
        }
    </script>
</body>
</html>
